name: Stock Monitor Daily
on:
  schedule:
    - cron: '0,15,30,45 8-16 * * 1-5'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Esegui con Maven
        run: |
          mvn clean compile
          mvn exec:java -Dexec.mainClass="it.stockmonitor.StockMonitor"

      
      - name: Salva Report e Storico
        run: |
          # 1. Configura l'utente
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Sincronizza SUBITO (Prima di aggiungere file)
          git pull origin main --rebase
          
          # 3. Crea le cartelle se mancano
          mkdir -p history
          mkdir -p output
          
          # 4. Aggiungi i file generati
          git add history/*.json
          git add output/*.xlsx
          
          # 5. Salva e invia (senza bloccarti se non ci sono modifiche)
          git commit -m "Aggiornamento automatico titoli" || echo "Nessuna modifica da salvare"
          git push origin main
      
      
