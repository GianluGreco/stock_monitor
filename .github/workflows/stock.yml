name: Stock Monitor Daily
on:
  schedule:
    - cron: '0,15,30,45 8-16 * * 1-5'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Esegui con Maven
        run: |
          mvn clean compile
          mvn exec:java -Dexec.mainClass="it.stockmonitor.StockMonitor"
      
      - name: Salva Report e Storico
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Forza lo scaricamento di eventuali modifiche fatte da te nel frattempo
          git pull origin main --rebase
          
          # Crea le cartelle fisicamente se il programma non l'ha fatto
          mkdir -p history
          mkdir -p output
          
          # IL COMANDO MAGICO: Aggiunge TUTTI i nuovi file creati (Excel e JSON)
          git add -A
          
          # Salva con un messaggio orario per vedere che cambia
          git commit -m "Update: $(date +'%Y-%m-%d %H:%M:%S')" || echo "Nessuna modifica"
          git push origin main
      
      
