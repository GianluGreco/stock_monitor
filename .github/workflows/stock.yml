name: Stock Monitor Daily
on:
  schedule:
    - cron: '0,15,30,45 8-16 * * 1-5'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Esegui con Maven
        run: |
          mvn clean compile
          mvn exec:java -Dexec.mainClass="it.stockmonitor.StockMonitor"

      - name: Salva Report e Storico
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. "Congela" i file nuovi creati dal programma Java
          git stash
          
          # 2. Sincronizza con il server
          git pull origin main --rebase
          
          # 3. "Scongela" i file
          git stash pop || echo "Nessun file da ripristinare"
          
          # 4. Crea le cartelle se per caso mancano
          mkdir -p history
          mkdir -p output
          
          # 5. Aggiungi e salva tutto
          git add history/*.json
          git add output/*.xlsx
          git commit -m "Aggiornamento automatico titoli" || echo "Nessuna modifica"
          git push origin main
      
      
