name: Stock Monitor Daily
on:
  schedule:
    - cron: '*/15 7-18 * * 1-5'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Esegui con Maven
        run: |
          mvn clean compile
          mvn exec:java -Dexec.mainClass="it.stockmonitor.StockMonitor"
     
      - name: Salva Report e Storico
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pulisce eventuali rimasugli e sincronizza
          git add .
          git stash || echo "Nulla da mettere in stash"
          git pull origin main --rebase
          git stash pop || echo "Nulla da ripristinare"
          
          # Forza l'aggiunta di TUTTI i file nuovi (Excel e JSON)
          mkdir -p history output
          git add -A
          
          # Esegue il commit con la data attuale per conferma visiva
          git commit -m "Update automatico: $(date +'%H:%M')" || echo "Nessuna modifica rilevata"
          git push origin main
      
      
