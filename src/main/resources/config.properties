# =============================================================
# STOCK MONITOR - File di configurazione
# =============================================================

# Titoli da monitorare (suffisso .MI = Borsa di Milano)
symbols=AVIO.MI,FCT.MI

# --- MODALITA' DI SCHEDULAZIONE ---
# Scegli UNA delle due opzioni, commenta l'altra.
#
# Opzione A: intervallo fisso in minuti (es. ogni 30 minuti)
schedule.interval.minutes=30
#
# Opzione B: orari fissi giornalieri (HH:mm separati da virgola)
# schedule.times=09:30,12:30,17:30

# Solo per modalità intervallo: fascia oraria di mercato
# Fuori da questa fascia il programma non rileva (mercato chiuso)
market.open=09:00
market.close=17:30

# Percorso del file Excel di output
excel.output.path=output/quotazioni.xlsx

# Cartella storico prezzi (file JSON per simbolo)
history.dir=history
